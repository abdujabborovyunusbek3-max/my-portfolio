<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunusbek Portfolio</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 50px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 8px; height: auto; }
        h1 { color: #333; }
    </style>
</head>
<body>

    <h1>Mening Grafik Dizayn Ishlarim</h1>
    <p>Yunusbek - Professional Dizayner</p>

    <div class="gallery">
        <div class="card">
            <img src="NBU.png" alt="Dizayn">
            <p>NBU loyihasi</p>
        </div>

        <div class="card">
            <img src="Artboard 1.png" alt="Dizayn">
            <p>Artboard 1</p>
        </div>

        <div class="card">
            <img src="Artboard 2.png" alt="Dizayn">
            <p>Artboard 2</p>
        </div>

        <div class="card">
            <img src="Artboard 3.png" alt="Dizayn">
            <p>Artboard 3</p>
        </div>
    </div>

</body>
</html>
