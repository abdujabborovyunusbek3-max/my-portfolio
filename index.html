<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunusbek Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 40px 20px; margin: 0; }
        h1 { color: #1a1a1a; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 40px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 8px; height: auto; object-fit: cover; }
        .title { margin-top: 15px; font-weight: bold; color: #444; }
    </style>
</head>
<body>

    <h1>Mening Grafik Dizayn Portfoliom</h1>
    <p>Professional dizayn ishlari to'plami</p>

    <div class="gallery">
        <div class="card"><img src="NBU.png"><div class="title">NBU Loyihasi</div></div>
        <div class="card"><img src="Artboard 1.png"><div class="title">Artboard 1</div></div>
        <div class="card"><img src="Artboard 1.1.png"><div class="title">Artboard 1.1</div></div>
        <div class="card"><img src="Artboard 2.png"><div class="title">Artboard 2</div></div>
        <div class="card"><img src="Artboard 3.png"><div class="title">Artboard 3</div></div>
        <div class="card"><img src="Artboard 4.png"><div class="title">Artboard 4</div></div>
        <div class="card"><img src="Artboard 11.4.png"><div class="title">Artboard 11.4</div></div>
        <div class="card"><img src="msxway.png"><div class="title">MSX Way</div></div>
    </div>

</body>
</html>
